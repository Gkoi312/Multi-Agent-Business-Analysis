<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | Tech Company Due Diligence</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    /* Spinner overlay styling */
    #spinner-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(3px);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      font-family: sans-serif;
    }

    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 70px;
      height: 70px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="dashboard-container">
    <h2>Welcome, {{ user }} 👋</h2>
    <p>Generate a structured due diligence report for a tech company.</p>
    <p><a href="/my_tasks">View My Tasks</a></p>

    <form id="generateForm" action="/generate_report" method="post">
      <label for="company_name">Company Name:</label>
      <input type="text" id="company_name" name="company_name" required placeholder="e.g. OpenAI" />

      <label for="focus">Focus Areas (Optional):</label>
      <input type="text" id="focus" name="focus" placeholder="e.g. business model, growth, regulatory risks" />

      <label for="target_role">Target Role (Optional):</label>
      <input type="text" id="target_role" name="target_role" placeholder="e.g. Product Manager Intern" />

      <button type="submit">Generate Due Diligence Report</button>
    </form>
  </div>

  <!-- Spinner overlay -->
  <div id="spinner-overlay">
    <div class="spinner"></div>
    <p>Running due diligence analysis... please wait</p>
  </div>

  <script>
    const form = document.getElementById("generateForm");
    const spinner = document.getElementById("spinner-overlay");

    form.addEventListener("submit", () => {
      spinner.style.display = "flex";   // show loader
    });
  </script>
</body>
</html>
